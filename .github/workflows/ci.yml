name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - v2-addon-migration
      - 'release-*'
    paths-ignore:
      - 'docs/**'
      - 'legacy/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'legacy/**'

env:
  CI: true

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: wyvox/action-setup-pnpm@v2
        with:
          node-version: '22'
      # The packages with lint configs. The directions/clusterer packages don't
      # ship lint configs yet (a cleanup follow-up).
      - run: pnpm --filter ember-google-maps --filter test-app-basic lint

  test:
    name: Tests (real Google)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: wyvox/action-setup-pnpm@v2
        with:
          node-version: '22'
      # Build the addon packages (topological order: core first) so the test
      # app resolves their built dist through the workspace.
      - name: Build addons
        run: >-
          pnpm
          --filter ember-google-maps
          --filter ember-google-maps-directions
          --filter test-addon-clusterer
          build
      # The test app's script loads ../.env.test via dotenv-cli. CI has no such
      # file, so materialize it from the repo secret. The key must allow the
      # localhost referrer (testem serves localhost in CI too).
      - name: Provide the Google Maps API key
        run: echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" > .env.test
      - name: Test against real Google Maps
        run: pnpm --filter test-app-basic test

